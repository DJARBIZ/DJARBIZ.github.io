<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJARBIZ | Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --p: #9b30ff;
      --p-bright: #c97fff;
      --p-glow: rgba(155,48,255,0.35);
      --p-soft: rgba(155,48,255,0.1);
      --bg: #06040a;
      --card: rgba(14,10,22,0.88);
      --border: rgba(120,80,200,0.2);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

    body {
      font-family:'Inter',sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      overflow-x:hidden;color:white;
      position:relative;
    }

    /* ══ COSMOS CANVAS ══ */
    #cosmos {
      position:fixed;inset:0;z-index:0;pointer-events:none;
    }

    /* ══ LAYOUT ══ */
    .container {
      position:relative;z-index:1;
      width:90%;max-width:460px;
      padding:50px 0 50px;
      text-align:center;
      display:flex;flex-direction:column;align-items:center;
    }

    /* ══ AVATAR ══ */
    .av-wrap {
      position:relative;display:inline-block;
      margin-bottom:22px;
      opacity:0;animation:up .8s ease .1s forwards;
    }
    .av-aura {
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:190px;height:190px;border-radius:50%;
      background:radial-gradient(circle,rgba(155,48,255,0.2) 0%,transparent 70%);
      animation:aura 3s ease-in-out infinite;z-index:-1;
    }
    @keyframes aura{
      0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:.9;transform:translate(-50%,-50%) scale(1.15)}
    }
    .av-img {
      width:130px;height:130px;border-radius:50%;
      object-fit:cover;display:block;
      border:2px solid rgba(155,48,255,0.5);
      box-shadow:0 0 20px var(--p-glow),0 0 50px rgba(155,48,255,0.15);
      transition:all .3s;
    }
    .av-img:hover{transform:scale(1.04);box-shadow:0 0 35px var(--p-glow);}

    /* ══ NAME ══ */
    .fullname {
      font-size:.72rem;font-weight:600;color:rgba(180,130,255,0.55);
      letter-spacing:5px;text-transform:uppercase;margin-bottom:4px;
      opacity:0;animation:up .8s ease .25s forwards;
    }
    .nickname {
      font-family:'Bebas Neue',sans-serif;
      font-size:3.5rem;letter-spacing:3px;
      color:white;
      text-shadow:0 0 14px var(--p-glow),0 0 35px rgba(155,48,255,0.2),3px 3px 8px rgba(0,0,0,.95);
      margin-bottom:6px;line-height:1;
      opacity:0;animation:up .8s ease .35s forwards;
      position:relative;display:inline-block;
    }
    .nickname::after{
      content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
      width:55%;height:2px;
      background:linear-gradient(90deg,transparent,var(--p),transparent);
    }
    .desc {
      font-size:.88rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;
      color:rgba(180,130,255,0.5);margin-bottom:16px;
      opacity:0;animation:up .8s ease .45s forwards;
    }

    /* ══ BIRTHDAY ══ */
    .bday {
      display:inline-flex;align-items:center;gap:8px;
      background:var(--p-soft);border:1px solid rgba(155,48,255,.28);
      padding:8px 22px;border-radius:30px;
      color:var(--p-bright);font-size:.88rem;font-weight:600;letter-spacing:1px;
      margin-bottom:28px;backdrop-filter:blur(8px);
      opacity:0;animation:up .8s ease .55s forwards;transition:all .3s;
    }
    .bday:hover{background:rgba(155,48,255,.18);box-shadow:0 0 18px var(--p-glow);transform:translateY(-2px);}

    /* ══ BUTTONS ══ */
    .links{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px;}
    .btn {
      display:flex;align-items:center;justify-content:center;gap:12px;
      padding:15px 24px;background:var(--card);
      border:1px solid var(--border);border-radius:12px;
      color:white;text-decoration:none;
      font-family:'Inter',sans-serif;font-size:.98rem;font-weight:600;
      position:relative;overflow:hidden;transition:all .3s ease;
      opacity:0;animation:up .8s ease forwards;
      cursor:pointer;backdrop-filter:blur(10px);
    }
    .btn:nth-child(1){animation-delay:.7s;}
    .btn:nth-child(2){animation-delay:.85s;}
    .btn:nth-child(3){animation-delay:1s;}
    .btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(155,48,255,.1),transparent);transition:left .5s;}
    .btn:hover::before{left:100%;}
    .btn:hover{transform:translateY(-3px) scale(1.012);border-color:var(--p);box-shadow:0 6px 25px var(--p-glow),0 0 40px rgba(155,48,255,.1);background:rgba(20,10,35,.98);}
    .btn i{color:var(--p-bright);font-size:1.1rem;transition:transform .3s;flex-shrink:0;}
    .btn:hover i{transform:scale(1.2);}
    .btn-main{background:linear-gradient(135deg,rgba(80,20,160,.35),rgba(155,48,255,.18));border-color:rgba(155,48,255,.4);}

    /* ══ GIFTS ══ */
    .sec {
      font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:5px;
      color:rgba(155,48,255,.5);
      margin:30px 0 14px;
      display:flex;align-items:center;gap:12px;width:100%;
      opacity:0;animation:up .8s ease 1.15s forwards;
    }
    .sec::before,.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(155,48,255,.3));}
    .sec::after{background:linear-gradient(270deg,transparent,rgba(155,48,255,.3));}

    .gifts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;opacity:0;animation:up .8s ease 1.25s forwards;}
    .gift{background:var(--card);border:1px solid rgba(100,50,180,.16);border-radius:12px;overflow:hidden;transition:all .35s;}
    .gift:hover{border-color:var(--p);box-shadow:0 0 22px var(--p-glow);transform:translateY(-4px);}
    .gift-img{width:100%;aspect-ratio:1;overflow:hidden;}
    .gift-img img{width:100%;height:100%;object-fit:cover;object-position:center 30%;transition:transform .4s;filter:brightness(.88) saturate(.82);}
    .gift:hover .gift-img img{transform:scale(1.07);filter:brightness(1) saturate(1);}
    .gift-info{padding:9px 11px;}
    .gift-name{font-size:.83rem;font-weight:700;color:#ddd0ff;}
    .gift-num{font-size:.72rem;color:rgba(170,120,255,.55);margin-top:1px;}

    /* ══ TOAST ══ */
    .toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(8,4,18,.97);color:var(--p-bright);padding:10px 22px;border-radius:8px;border:1px solid var(--p);font-weight:700;font-size:.92rem;opacity:0;pointer-events:none;transition:all .3s;z-index:999;box-shadow:0 0 20px var(--p-glow);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    footer{position:relative;z-index:1;padding:18px;color:rgba(155,48,255,.28);font-size:.76rem;letter-spacing:1px;opacity:0;animation:fade 1s ease 2s forwards;}

    @keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @media(max-width:400px){.nickname{font-size:2.9rem;}}

    /* ══ HERO LAYOUT ══ */
    .hero {
      display:flex;align-items:center;justify-content:space-between;
      gap:18px;width:100%;max-width:400px;
      margin-bottom:14px;
      opacity:0;animation:up .8s ease .1s forwards;
    }
    .hero-right {
      display:flex;flex-direction:column;align-items:flex-start;
      flex:1;min-width:0;
    }
    .nickname-big {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.25rem;letter-spacing:2px;line-height:1;
      white-space:nowrap;
      color:white;
      text-shadow:0 0 14px var(--p-glow),3px 3px 8px rgba(0,0,0,.95);
    }
    .nick-underline {
      width:85%;height:2px;margin:6px 0 5px;
      background:linear-gradient(90deg,var(--p),transparent);
    }
    .username-small {
      font-size:.78rem;font-weight:600;letter-spacing:2px;
      color:rgba(180,130,255,0.55);
    }
    /* override old centering for desc inside hero */
    .hero .desc { opacity:1 !important; animation:none !important; }
    /* hide old centered av-wrap animation since hero handles it */
    .hero .av-wrap { opacity:1 !important; animation:none !important; margin-bottom:0; }
    .hero .av-img { width:90px;height:90px; }
    .hero .av-aura { width:130px;height:130px; }
  </style>
</head>

<script>
/* ══ COSMOS BACKGROUND ══ */
(function() {
  const cv = document.getElementById('cosmos');
  const ctx = cv.getContext('2d');
  let W, H;

  function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  /* Stars */
  const stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.1 + 0.15,
      a: Math.random() * 0.6 + 0.1,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.005 + 0.001,
      vx: (Math.random() - .5) * 0.025, vy: (Math.random() - .5) * 0.025,
    });
  }
  /* Bright stars */
  for (let i = 0; i < 20; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.8 + 0.8,
      a: Math.random() * 0.8 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.003 + 0.001,
      vx: (Math.random() - .5) * 0.015, vy: (Math.random() - .5) * 0.015,
      purple: true,
    });
  }

  /* Nebula clouds */
  const nebulae = [
    { x: W * 0.15, y: H * 0.2,  rx: 220, ry: 140, a: 0.03, col: '120,30,220' },
    { x: W * 0.85, y: H * 0.75, rx: 180, ry: 200, a: 0.025, col: '80,20,160' },
    { x: W * 0.5,  y: H * 0.5,  rx: 280, ry: 180, a: 0.018, col: '100,40,200' },
    { x: W * 0.3,  y: H * 0.85, rx: 160, ry: 120, a: 0.022, col: '60,10,120' },
  ];

  /* Shooting stars */
  const shoots = [];
  function addShoot() {
    shoots.push({
      x: Math.random() * W * 1.2,
      y: Math.random() * H * 0.5,
      len: Math.random() * 120 + 60,
      speed: Math.random() * 4 + 3,
      a: 1, life: 1,
    });
    setTimeout(addShoot, Math.random() * 5000 + 3000);
  }
  addShoot();

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* Deep space gradient */
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*.8);
    bg.addColorStop(0, 'rgba(12,6,22,1)');
    bg.addColorStop(0.5, 'rgba(6,3,12,1)');
    bg.addColorStop(1, 'rgba(2,1,5,1)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    t += 0.012;

    /* Nebulae */
    for (const n of nebulae) {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
      g.addColorStop(0,   `rgba(${n.col},${n.a * 1.8})`);
      g.addColorStop(0.4, `rgba(${n.col},${n.a})`);
      g.addColorStop(1,   `rgba(${n.col},0)`);
      ctx.save();
      ctx.scale(n.rx / Math.max(n.rx,n.ry), n.ry / Math.max(n.rx,n.ry));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x / (n.rx/Math.max(n.rx,n.ry)), n.y / (n.ry/Math.max(n.rx,n.ry)), Math.max(n.rx,n.ry), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    /* Stars */
    for (const s of stars) {
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
      if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
      const a = s.a * (.7 + Math.sin(t * s.speed * 60 + s.phase) * .35);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      if (s.purple) {
        ctx.fillStyle = `rgba(180,120,255,${a})`;
      } else {
        ctx.fillStyle = `rgba(210,200,230,${a})`;
      }
      ctx.fill();
      /* tiny glow on brighter stars */
      if (s.r > 1 && a > 0.4) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI*2);
        ctx.fillStyle = s.purple ? `rgba(155,48,255,${a * .08})` : `rgba(200,190,220,${a * .05})`;
        ctx.fill();
      }
    }

    /* Shooting stars */
    for (let i = shoots.length - 1; i >= 0; i--) {
      const s = shoots[i];
      s.x -= s.speed * 1.6; s.y += s.speed * 0.7;
      s.life -= 0.018;
      if (s.life <= 0) { shoots.splice(i, 1); continue; }
      const g = ctx.createLinearGradient(s.x, s.y, s.x + s.len * 1.4, s.y - s.len * 0.6);
      g.addColorStop(0, `rgba(255,255,255,0)`);
      g.addColorStop(0.6, `rgba(200,180,255,${s.life * .7})`);
      g.addColorStop(1, `rgba(255,255,255,${s.life * .9})`);
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + s.len * 1.4, s.y - s.len * 0.6);
      ctx.strokeStyle = g;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══ COPY ID ══ */
function copyID() {
  const id = '5883796026';
  const txt = document.getElementById('idTxt');
  const orig = txt.textContent;
  navigator.clipboard.writeText(id).catch(() => {
    const t = document.createElement('textarea'); t.value = id;
    document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  });
  const toast = document.getElementById('toast');
  toast.classList.add('show'); txt.textContent = 'Скопировано!';
  document.getElementById('idBtn').style.borderColor = 'var(--p)';
  setTimeout(() => {
    toast.classList.remove('show'); txt.textContent = orig;
    document.getElementById('idBtn').style.borderColor = '';
  }, 2000);
}
</script>
